<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Know Your Propaganda - Anti-Fake Detective Academy</title>
  <meta name="description" content="Learn to spot propaganda techniques. Take the Resistance Test and earn your Agent rank.">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: { DEFAULT: '#f59e0b', light: '#fbbf24', dark: '#d97706' }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace']
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">

<!-- Overlay (mobile drawer) -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-40 hidden md:hidden" aria-hidden="true"></div>

<!-- Sidebar: hidden off-canvas &lt; md; fixed open on md+ -->
<aside id="sidebar" class="sidebar-shell fixed left-0 top-0 h-full w-[min(15rem,88vw)] z-50 flex flex-col bg-white border-r border-slate-200 transition-transform duration-300 ease-out shadow-sm">

  <!-- Brand -->
  <div class="p-4 border-b border-slate-200 bg-gradient-to-r from-amber-50 to-white">
    <a href="#home" class="flex items-center gap-3 group">
      <div class="w-9 h-9 bg-gradient-to-br from-amber-400 to-amber-500 rounded-lg flex items-center justify-center text-base shadow-md shadow-amber-200 group-hover:shadow-amber-300 transition-shadow">🛡️</div>
      <div>
        <div class="font-bold text-sm text-slate-800 tracking-tight" data-brand>Know Your</div>
        <div class="text-xs text-amber-600 font-semibold tracking-wide" data-brand-sub>Propaganda</div>
      </div>
    </a>
  </div>

  <!-- Nav: 4 primary items only -->
  <nav class="flex-1 px-3 py-4 overflow-y-auto sidebar-scroll">
    <div id="section-nav" class="nav-section-heading">Navigazione</div>

    <button class="nav-item active" data-page="home">
      <span class="nav-icon">🏠</span> <span data-label>Panoramica</span>
    </button>
    <button class="nav-item" data-page="techniques">
      <span class="nav-icon">📚</span> <span data-label>Tutte le Tecniche</span>
      <span class="ml-auto bg-amber-100 text-amber-700 text-caption font-bold font-mono px-1.5 py-0.5 rounded" id="techniques-count">-</span>
    </button>
    <button class="nav-item" data-page="quiz">
      <span class="nav-icon">🕵️</span> <span data-label>Test Resistenza</span>
    </button>
    <button class="nav-item" data-page="about">
      <span class="nav-icon">ℹ️</span> <span data-label>Informazioni</span>
    </button>
  </nav>
</aside>

<!-- Main: full width on mobile; offset on desktop -->
<main class="main-with-sidebar min-h-screen flex flex-col">
  <header class="sticky top-0 z-30 bg-white/90 backdrop-blur-lg border-b border-slate-200 px-4 py-3 md:px-6">
    <div class="flex items-center justify-between gap-3">
      <div class="flex items-center gap-3 min-w-0 flex-1">
        <button id="sidebar-toggle" type="button" class="md:hidden p-2 -ml-1 rounded-lg text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition-colors" aria-label="Apri menu" aria-expanded="false" aria-controls="sidebar">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h1 class="font-bold text-slate-800 text-heading-sm tracking-tight truncate" id="page-title">Panoramica</h1>
      </div>
      <div class="flex items-center gap-3 flex-shrink-0">
        <div id="explored-wrap" class="hidden sm:flex items-center gap-1.5 text-small text-slate-400 font-mono">
          <span class="text-amber-500">★</span>
          <span id="explored-count">0</span>
          <span id="explored-suffix">tecniche esplorate</span>
        </div>
        <button id="lang-switch" data-switch-to="en" class="px-3 py-1.5 text-small font-semibold rounded-lg bg-slate-100 text-slate-600 hover:text-slate-800 hover:bg-slate-200 border border-slate-200 transition-all">
          EN
        </button>
      </div>
    </div>
  </header>

  <div id="content" class="p-4 md:p-6 lg:p-8 flex-1 min-w-0"></div>
</main>

<script src="js/utils.js"></script>
<script src="js/i18n.js"></script>
<script src="js/storage.js"></script>
<script src="js/state.js"></script>
<script src="js/analyzer.js"></script>
<script src="js/render.js"></script>
<script src="js/quiz.js"></script>
<script src="js/app.js"></script>
</body>
</html>
